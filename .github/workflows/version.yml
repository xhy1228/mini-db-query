name: Version Management

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: '版本更新类型'
        required: true
        default: 'patch'
        type: choice
        options:
          - major  # 主版本 (1.0.0 -> 2.0.0)
          - minor  # 次版本 (1.0.0 -> 1.1.0)
          - patch  # 补丁版本 (1.0.0 -> 1.0.1)
          - build  # 构建号 (1.0.0.00 -> 1.0.0.01)

jobs:
  bump-version:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Get current version
        id: current
        run: |
          CURRENT=$(cat backend/version.py | grep VERSION | cut -d'"' -f2)
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT"
          
      - name: Calculate new version
        id: new
        run: |
          CURRENT="${{ steps.current.outputs.current }}"
          TYPE="${{ inputs.version_type }}"
          
          # Parse version (format: vX.Y.Z.WW or vX.Y.Z)
          VERSION=$(echo $CURRENT | sed 's/v//')
          
          IFS='.' read -r MAJOR MINOR PATCH BUILD <<< "$VERSION"
          
          case $TYPE in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              BUILD="00"
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              BUILD="00"
              ;;
            patch)
              PATCH=$((PATCH + 1))
              BUILD="00"
              ;;
            build)
              if [ -z "$BUILD" ]; then
                BUILD=01
              else
                BUILD=$(printf "%02d" $((10#$BUILD + 1)))
              fi
              ;;
          esac
          
          if [ -z "$BUILD" ]; then
            NEW_VERSION="v$MAJOR.$MINOR.$PATCH"
          else
            NEW_VERSION="v$MAJOR.$MINOR.$PATCH.$BUILD"
          fi
          
          echo "new=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"
          
      - name: Update version file
        run: |
          NEW_VERSION="${{ steps.new.outputs.new }}"
          TIMESTAMP=$(date '+%Y-%m-%d %H:%M:%S')
          
          cat > backend/version.py << EOF
          # 版本信息
          VERSION = "$NEW_VERSION"
          UPDATED_AT = "$TIMESTAMP"
          EOF
          
          echo "Updated version.py:"
          cat backend/version.py
          
      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add backend/version.py
          git commit -m "chore: bump version to ${{ steps.new.outputs.new }}"
          git push
          
          echo "Version bumped from ${{ steps.current.outputs.current }} to ${{ steps.new.outputs.new }}"
          
      - name: Create version tag
        run: |
          git tag -a "${{ steps.new.outputs.new }}" -m "Release ${{ steps.new.outputs.new }}"
          git push origin "${{ steps.new.outputs.new }}"
          
      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.new.outputs.new }}
          release_name: Release ${{ steps.new.outputs.new }}
          body: |
            ## 版本更新
            
            **版本**: ${{ steps.new.outputs.new }}
            **更新时间**: $(date '+%Y-%m-%d %H:%M:%S')
            
            ### 更新内容
            - 版本号自动更新
            
          draft: false
          prerelease: false
