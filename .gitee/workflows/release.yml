# Gitee Go 自动化发布工作流
# 触发条件：push tag (如 v1.2.2.12)
# 自动执行：打包 → 推送到 releases 目录 → 创建 Release

name: Release Package

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "当前版本: $VERSION"

      - name: Package backend
        run: |
          VERSION=${{ steps.version.outputs.version }}
          zip -r "mini-db-query-backend-v${VERSION}.zip" backend/ -x "*.pyc" -x "__pycache__/*"

      - name: Package miniapp
        run: |
          VERSION=${{ steps.version.outputs.version }}
          zip -r "mini-db-query-miniapp-v${VERSION}.zip" miniapp/ -x "*.pyc" -x "__pycache__/*"

      - name: Package scripts
        run: |
          VERSION=${{ steps.version.outputs.version }}
          zip -r "mini-db-query-scripts-v${VERSION}.zip" scripts/ backend/migrations/

      - name: Create releases directory
        run: |
          VERSION=${{ steps.version.outputs.version }}
          mkdir -p releases/v${VERSION}
          mv mini-db-query-*.zip releases/v${VERSION}/

      - name: Commit and push
        run: |
          VERSION=${{ steps.version.outputs.version }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add releases/
          git commit -m "chore: 添加 v${VERSION} 发行版文件" || echo "没有新文件需要提交"
          
          # 推送到 Gitee
          git push https://${{ secrets.GITEE_TOKEN }}@gitee.com/xhy1230/mini-db-query.git main

      - name: Create Gitee Release
        run: |
          VERSION=${{ steps.version.outputs.version }}
          curl -X POST "https://gitee.com/api/v5/repos/xhy1230/mini-db-query/releases" \
            -H "Authorization: token ${{ secrets.GITEE_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"tag_name\": \"v${VERSION}\",
              \"target_commitish\": \"main\",
              \"name\": \"Release v${VERSION}\",
              \"body\": \"## 更新内容\n\n请查看 CHANGELOG.md\n\n## 下载地址\n\n| 文件 |\n|------|\n| [mini-db-query-backend-v${VERSION}.zip](https://gitee.com/xhy1230/mini-db-query/raw/main/releases/v${VERSION}/mini-db-query-backend-v${VERSION}.zip) |\n| [mini-db-query-miniapp-v${VERSION}.zip](https://gitee.com/xhy1230/mini-db-query/raw/main/releases/v${VERSION}/mini-db-query-miniapp-v${VERSION}.zip) |\n| [mini-db-query-scripts-v${VERSION}.zip](https://gitee.com/xhy1230/mini-db-query/raw/main/releases/v${VERSION}/mini-db-query-scripts-v${VERSION}.zip)\"
            }"
