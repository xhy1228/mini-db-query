<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多源数据查询 - 管理平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-box {
            width: 400px;
            padding: 40px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        .login-title {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
            font-size: 24px;
        }
        .login-subtitle {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        .login-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        .error-msg {
            color: #e74c3c;
            text-align: center;
            margin-bottom: 20px;
            display: none;
        }
        .main-container {
            display: none;
        }
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 240px;
            height: 100vh;
            background: #1a1a2e;
            color: white;
            padding: 20px 0;
        }
        .sidebar-header {
            padding: 0 20px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 20px;
        }
        .sidebar-logo {
            font-size: 20px;
            font-weight: bold;
        }
        .sidebar-menu {
            list-style: none;
        }
        .sidebar-menu li {
            padding: 12px 20px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .sidebar-menu li:hover,
        .sidebar-menu li.active {
            background: rgba(255,255,255,0.1);
        }
        .content {
            margin-left: 240px;
            padding: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logout-btn {
            padding: 8px 16px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .card-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th {
            background: #f8f9fa;
            font-weight: 600;
        }
        .btn {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 5px;
        }
        .btn-primary {
            background: #667eea;
            color: white;
        }
        .btn-danger {
            background: #e74c3c;
            color: white;
        }
        .btn-success {
            background: #27ae60;
            color: white;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>
    <!-- 登录页面 -->
    <div id="loginPage" class="login-box">
        <h1 class="login-title">多源数据查询</h1>
        <p class="login-subtitle">管理平台</p>
        <div class="error-msg" id="errorMsg"></div>
        <form id="loginForm">
            <div class="form-group">
                <label>账号</label>
                <input type="text" id="phone" placeholder="请输入账号" required>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" placeholder="请输入密码" required>
            </div>
            <button type="submit" class="login-btn" id="loginBtn">登 录</button>
        </form>
    </div>

    <!-- 主界面 -->
    <div id="mainPage" class="main-container">
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">📊 数据查询</div>
            </div>
            <ul class="sidebar-menu">
                <li class="active" data-tab="users">用户管理</li>
                <li data-tab="schools">学校管理</li>
                <li data-tab="databases">数据库配置</li>
                <li data-tab="templates">查询模板</li>
                <li data-tab="categories">业务大类</li>
                <li data-tab="permissions">权限管理</li>
            </ul>
        </div>
        <div class="content">
            <div class="header">
                <h2 id="pageTitle">用户管理</h2>
                <div class="user-info">
                    <span id="currentUserName">管理员</span>
                    <button class="logout-btn" onclick="logout()">退出登录</button>
                </div>
            </div>

            <!-- 用户管理 -->
            <div id="usersTab" class="tab-content active">
                <div class="card">
                    <div class="card-title">用户列表</div>
                    <table id="usersTable">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>账号</th>
                                <th>姓名</th>
                                <th>角色</th>
                                <th>状态</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>

            <!-- 学校管理 -->
            <div id="schoolsTab" class="tab-content">
                <div class="card">
                    <div class="card-title">学校列表</div>
                    <table id="schoolsTable">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>学校名称</th>
                                <th>编码</th>
                                <th>状态</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>

            <!-- 数据库配置 -->
            <div id="databasesTab" class="tab-content">
                <div class="card">
                    <div class="card-title">数据库配置列表</div>
                    <table id="databasesTable">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>名称</th>
                                <th>类型</th>
                                <th>主机</th>
                                <th>状态</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>

            <!-- 查询模板 -->
            <div id="templatesTab" class="tab-content">
                <div class="card">
                    <div class="card-title">查询模板列表</div>
                    <table id="templatesTable">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>模板名称</th>
                                <th>业务大类</th>
                                <th>状态</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>

            <!-- 业务大类 -->
            <div id="categoriesTab" class="tab-content">
                <div class="card">
                    <div class="card-title">业务大类列表</div>
                    <table id="categoriesTable">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>编码</th>
                                <th>名称</th>
                                <th>图标</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>

            <!-- 权限管理 -->
            <div id="permissionsTab" class="tab-content">
                <div class="card">
                    <div class="card-title">权限管理</div>
                    <p>权限管理功能开发中...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let token = localStorage.getItem('token');
        let currentUser = null;

        // 检查登录状态
        if (token) {
            showMainPage();
        }

        // 登录表单提交
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');

            btn.disabled = true;
            btn.textContent = '登录中...';
            errorMsg.style.display = 'none';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, password })
                });

                const data = await res.json();

                if (data.code === 200 && data.data) {
                    token = data.data.access_token;
                    currentUser = data.data.user;
                    localStorage.setItem('token', token);
                    showMainPage();
                } else {
                    errorMsg.textContent = data.message || '登录失败';
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.textContent = '网络错误，请检查服务是否启动';
                errorMsg.style.display = 'block';
            }

            btn.disabled = false;
            btn.textContent = '登 录';
        });

        // 显示主页面
        async function showMainPage() {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('mainPage').style.display = 'block';
            
            // 获取用户信息
            try {
                const res = await fetch('/api/auth/me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.code === 200 && data.data) {
                    currentUser = data.data;
                    document.getElementById('currentUserName').textContent = currentUser.name || currentUser.phone;
                }
            } catch (e) {
                console.error('获取用户信息失败', e);
            }

            loadUsers();
        }

        // 退出登录
        function logout() {
            localStorage.removeItem('token');
            token = null;
            currentUser = null;
            document.getElementById('loginPage').style.display = 'block';
            document.getElementById('mainPage').style.display = 'none';
        }

        // 切换标签页
        document.querySelectorAll('.sidebar-menu li').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.sidebar-menu li').forEach(i => i.classList.remove('active'));
                item.classList.add('active');
                
                const tab = item.dataset.tab;
                document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
                document.getElementById(tab + 'Tab').classList.add('active');

                const titles = {
                    users: '用户管理',
                    schools: '学校管理',
                    databases: '数据库配置',
                    templates: '查询模板',
                    categories: '业务大类',
                    permissions: '权限管理'
                };
                document.getElementById('pageTitle').textContent = titles[tab] || tab;

                // 加载数据
                if (tab === 'users') loadUsers();
                if (tab === 'schools') loadSchools();
                if (tab === 'databases') loadDatabases();
                if (tab === 'templates') loadTemplates();
                if (tab === 'categories') loadCategories();
            });
        });

        // 请求封装
        async function request(url, options = {}) {
            const res = await fetch(url, {
                ...options,
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`,
                    ...options.headers
                }
            });
            return res.json();
        }

        // 加载用户列表
        async function loadUsers() {
            try {
                const res = await request('/api/manage/users');
                const tbody = document.querySelector('#usersTable tbody');
                tbody.innerHTML = '';
                if (res.code === 200 && res.data) {
                    res.data.forEach(user => {
                        tbody.innerHTML += `
                            <tr>
                                <td>${user.id}</td>
                                <td>${user.phone}</td>
                                <td>${user.name || '-'}</td>
                                <td>${user.role || 'user'}</td>
                                <td>${user.is_active ? '启用' : '禁用'}</td>
                                <td>
                                    <button class="btn btn-primary" onclick="editUser(${user.id})">编辑</button>
                                    <button class="btn btn-danger" onclick="deleteUser(${user.id})">删除</button>
                                </td>
                            </tr>
                        `;
                    });
                }
            } catch (e) {
                console.error('加载用户失败', e);
            }
        }

        // 加载学校列表
        async function loadSchools() {
            try {
                const res = await request('/api/manage/schools');
                const tbody = document.querySelector('#schoolsTable tbody');
                tbody.innerHTML = '';
                if (res.code === 200 && res.data) {
                    res.data.forEach(school => {
                        tbody.innerHTML += `
                            <tr>
                                <td>${school.id}</td>
                                <td>${school.name}</td>
                                <td>${school.code || '-'}</td>
                                <td>${school.is_active ? '启用' : '禁用'}</td>
                                <td>
                                    <button class="btn btn-primary" onclick="editSchool(${school.id})">编辑</button>
                                </td>
                            </tr>
                        `;
                    });
                }
            } catch (e) {
                console.error('加载学校失败', e);
            }
        }

        // 加载数据库配置
        async function loadDatabases() {
            try {
                const res = await request('/api/manage/databases');
                const tbody = document.querySelector('#databasesTable tbody');
                tbody.innerHTML = '';
                if (res.code === 200 && res.data) {
                    res.data.forEach(db => {
                        tbody.innerHTML += `
                            <tr>
                                <td>${db.id}</td>
                                <td>${db.name}</td>
                                <td>${db.db_type}</td>
                                <td>${db.host}:${db.port}</td>
                                <td>${db.is_active ? '启用' : '禁用'}</td>
                                <td>
                                    <button class="btn btn-primary" onclick="testConnection(${db.id})">测试连接</button>
                                </td>
                            </tr>
                        `;
                    });
                }
            } catch (e) {
                console.error('加载数据库配置失败', e);
            }
        }

        // 加载查询模板
        async function loadTemplates() {
            try {
                const res = await request('/api/manage/templates');
                const tbody = document.querySelector('#templatesTable tbody');
                tbody.innerHTML = '';
                if (res.code === 200 && res.data) {
                    res.data.forEach(tpl => {
                        tbody.innerHTML += `
                            <tr>
                                <td>${tpl.id}</td>
                                <td>${tpl.name}</td>
                                <td>${tpl.category_name || '-'}</td>
                                <td>${tpl.is_active ? '启用' : '禁用'}</td>
                                <td>
                                    <button class="btn btn-primary" onclick="editTemplate(${tpl.id})">编辑</button>
                                </td>
                            </tr>
                        `;
                    });
                }
            } catch (e) {
                console.error('加载模板失败', e);
            }
        }

        // 加载业务大类
        async function loadCategories() {
            try {
                const res = await request('/api/categories');
                const tbody = document.querySelector('#categoriesTable tbody');
                tbody.innerHTML = '';
                if (res.code === 200 && res.data) {
                    res.data.forEach(cat => {
                        tbody.innerHTML += `
                            <tr>
                                <td>${cat.id}</td>
                                <td>${cat.code}</td>
                                <td>${cat.name}</td>
                                <td>${cat.icon || '-'}</td>
                                <td>
                                    <button class="btn btn-primary" onclick="editCategory(${cat.id})">编辑</button>
                                </td>
                            </tr>
                        `;
                    });
                }
            } catch (e) {
                console.error('加载业务大类失败', e);
            }
        }

        // 占位函数
        function editUser(id) { alert('编辑用户: ' + id); }
        function deleteUser(id) { alert('删除用户: ' + id); }
        function editSchool(id) { alert('编辑学校: ' + id); }
        function testConnection(id) { alert('测试连接: ' + id); }
        function editTemplate(id) { alert('编辑模板: ' + id); }
        function editCategory(id) { alert('编辑业务大类: ' + id); }
    </script>
</body>
</html>
